services:
  - type: web
    name: emotion-ai-research
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: 8080
      - key: AI_API_KEY
        sync: false
      - key: AI_API_URL
        sync: false
      - key: AI_MODEL
        sync: false
